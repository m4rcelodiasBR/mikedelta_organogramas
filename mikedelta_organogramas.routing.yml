mikedelta_organogramas.dashboard:
  path: "/admin/structure/md-organogramas/dashboard"
  defaults:
    _controller: '\Drupal\mikedelta_organogramas\Controller\DashboardController::listar'
    _title: "Dashboard de Organogramas"
  requirements:
    _permission: "administrar mikedelta organogramas"

mikedelta_organogramas.mestre_add:
  path: "/admin/structure/md-organogramas/add"
  defaults:
    _form: '\Drupal\mikedelta_organogramas\Form\OrganogramaMestreForm'
    _title: "Criar Novo Organograma"
  requirements:
    _permission: "administrar mikedelta organogramas"

mikedelta_organogramas.mestre_edit:
  path: "/admin/structure/md-organogramas/edit/{id}"
  defaults:
    _form: '\Drupal\mikedelta_organogramas\Form\OrganogramaMestreForm'
    _title: "Editar Organograma"
  requirements:
    _permission: "administrar mikedelta organogramas"

mikedelta_organogramas.mestre_delete:
  path: "/admin/structure/md-organogramas/delete/{id}"
  defaults:
    _form: '\Drupal\mikedelta_organogramas\Form\OrganogramaMestreDeleteForm'
    _title: "Excluir Organograma"
  requirements:
    _permission: "administrar mikedelta organogramas"

mikedelta_organogramas.public_view:
  path: "/md-organograma/{slug}"
  defaults:
    _controller: '\Drupal\mikedelta_organogramas\Controller\OrganogramaController::exibir'
    _title: "Organograma"
  requirements:
    _access: 'TRUE'

mikedelta_organogramas.admin_list:
  path: "/admin/structure/md-organograma/{organograma_id}/membros"
  defaults:
    _form: '\Drupal\mikedelta_organogramas\Form\OrganogramaListForm'
    _title: "Gerenciar Organograma"
  requirements:
    _permission: "administrar mikedelta organogramas"

mikedelta_organogramas.admin_add:
  path: "/admin/structure/md-organograma/{organograma_id}/membros/add"
  defaults:
    _form: '\Drupal\mikedelta_organogramas\Form\MembroForm'
    _title: "Adicionar Membro"
  requirements:
    _permission: "administrar mikedelta organogramas"

mikedelta_organogramas.admin_edit:
  path: "/admin/structure/md-organograma/{organograma_id}/membros/edit/{id}"
  defaults:
    _form: '\Drupal\mikedelta_organogramas\Form\MembroForm'
    _title: "Editar Membro"
  requirements:
    _permission: "administrar mikedelta organogramas"

mikedelta_organogramas.admin_delete:
  path: "/admin/structure/md-organograma/{organograma_id}/membros/delete/{id}"
  defaults:
    _form: '\Drupal\mikedelta_organogramas\Form\MembroDeleteForm'
    _title: "Excluir Membro"
  requirements:
    _permission: "administrar mikedelta organogramas"

mikedelta_organogramas.backup_restore:
  path: "/admin/structure/md-organograma/backup-restore"
  defaults:
    _form: '\Drupal\mikedelta_organogramas\Form\BackupRestoreForm'
    _title: "Backup e Restauração"
  requirements:
    _permission: "administrar mikedelta organogramas"

mikedelta_organogramas.backup_global:
  path: "/admin/structure/md-organograma/backup-global"
  defaults:
    _controller: '\Drupal\mikedelta_organogramas\Controller\BackupController::exportarTodosJson'
  requirements:
    _permission: "administrar mikedelta organogramas"

mikedelta_organogramas.backup_single:
  path: "/admin/structure/md-organograma/backup/{id}"
  defaults:
    _controller: '\Drupal\mikedelta_organogramas\Controller\BackupController::exportarUnicoJson'
  requirements:
    _permission: "administrar mikedelta organogramas"
